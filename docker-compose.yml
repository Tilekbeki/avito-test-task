services:
  client:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_OLLAMA_URL=http://localhost:11434
      - VITE_AI_MODEL=llama3
    depends_on:
      - server
      - ollama
    volumes:
      - ./front:/app
      - /app/node_modules

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://localhost:11434
    volumes:
      - ./server:/app
      - /app/node_modules

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: